groups:
  # ---------------------------------------------------------------------------
  # GPU health & efficiency (DCGM exporter metrics)
  # ---------------------------------------------------------------------------
  - name: gpulens.gpu
    rules:
      - alert: GPUExporterDown
        expr: up{job="dcgm"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DCGM exporter down ({{ $labels.instance }})"
          description: "No GPU metrics scraped from {{ $labels.instance }} for 5m. GPU visibility is blind."

      - alert: GPUHighTemperature
        expr: DCGM_FI_DEV_GPU_TEMP > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.gpu }} hot on {{ $labels.Hostname }} ({{ $value }}°C)"
          description: "Sustained >85°C for 10m — check airflow/throttling."

      - alert: GPUMemoryNearFull
        expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.95
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.gpu }} memory >95% on {{ $labels.Hostname }}"
          description: "Framebuffer near full for 10m — OOM risk for new allocations."

      - alert: GPUDoubleBitECCError
        expr: increase(DCGM_FI_DEV_ECC_DBE_VOL_TOTAL[10m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Double-bit ECC error on GPU {{ $labels.gpu }} ({{ $labels.Hostname }})"
          description: "Uncorrectable memory error — drain the node and inspect the card."

      - alert: GPUXidError
        expr: DCGM_FI_DEV_XID_ERRORS > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "XID error {{ $value }} on GPU {{ $labels.gpu }} ({{ $labels.Hostname }})"
          description: "NVIDIA XID errors usually mean a hung/faulted GPU. Investigate before scheduling more work."

      # Efficiency, not health: a GPU sitting near-idle is likely a wasted reservation.
      - alert: GPUIdleReservationWaste
        expr: avg_over_time(DCGM_FI_DEV_GPU_UTIL[30m]) < 5
        for: 30m
        labels:
          severity: info
        annotations:
          summary: "GPU {{ $labels.gpu }} <5% util for 30m on {{ $labels.Hostname }}"
          description: "Possible reservation waste — a job holding a GPU it isn't using."

  # ---------------------------------------------------------------------------
  # Scheduler health (SLURM exporter metrics)
  # NOTE: metric names vary by exporter implementation. These match the common
  # vpenso/prometheus-slurm-exporter names; adjust if you use a different one.
  # ---------------------------------------------------------------------------
  - name: gpulens.slurm
    rules:
      - alert: SlurmExporterDown
        expr: up{job="slurm"} == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "SLURM exporter down"
          description: "Scheduler metrics unavailable for 5m — queue/occupancy visibility lost."

      - alert: SlurmNodesDown
        expr: slurm_nodes_down > 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} SLURM node(s) DOWN"
          description: "Compute capacity reduced. `scontrol show nodes` to investigate."

      - alert: SlurmQueueBacklog
        expr: slurm_queue_pending > 50
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "SLURM pending queue >50 for 15m"
          description: "Sustained backlog — cluster may be undersized or jobs are stuck pending on resources."
